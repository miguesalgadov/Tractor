<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hasta Atrás Nicolás</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace}
canvas{display:block;cursor:crosshair;border:3px solid #ff2200;border-radius:4px;box-shadow:0 0 40px rgba(255,34,0,.5),0 0 80px rgba(255,34,0,.18)}
.ctrl{color:#333;font-size:6px;text-align:center;margin-top:6px;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="c" width="820" height="520"></canvas>
<div class="ctrl">WASD / FLECHAS: mover &nbsp;|&nbsp; MOUSE: apuntar &nbsp;|&nbsp; CLICK / ESPACIO: disparar</div>
<script>
const cv=document.getElementById('c'),g=cv.getContext('2d');
const W=820,H=520;
let ST='menu',level=1,score=0,lives=3,tick=0;
let mx=W/2,my=H/2,keys={},autoFire=false;
let hi=0,combo=0,comboT=0,wpnLv=0;
let wKills=0,transTmr=0,spawnTmr=0;
let enemies=[],bullets=[],parts=[],floats=[],pickups=[];
let boss=null,shakeT=0,pickupTmr=350;

// Player
const PL={x:W/2,y:H/2,r:16,spd:3.6,angle:0,iframes:0,fireCd:0};

// Weapons
const WPNS=[
  {nm:'PISTOLA',      dmg:28, cd:22, spd:9,  col:'#cccccc', spread:0,   sh:1},
  {nm:'ESCOPETA',     dmg:22, cd:42, spd:7.5,col:'#ffaa00', spread:.32, sh:5},
  {nm:'AMETRALLADORA',dmg:14, cd:7,  spd:12, col:'#00e5ff', spread:.1,  sh:1},
  {nm:'LANZACOHETES', dmg:999,cd:55, spd:6.5,col:'#ff5500', spread:0,   sh:1, expl:true},
];
const WPNUP=[0,500,1500,3000];

// Level configs
const LVLS=[
  {name:'NIVEL 1',sub:'GALLINAS ZOMBIE',   type:'chicken',kills:20,bg:'#081504',gnd:'#102008',spr:72},
  {name:'NIVEL 2',sub:'VACAS LOCAS',       type:'cow',    kills:15,bg:'#050d18',gnd:'#0b1828',spr:95},
  {name:'NIVEL 3',sub:'TOROS FURIOSOS',    type:'bull',   kills:10,bg:'#180505',gnd:'#280b0b',spr:115},
  {name:'NIVEL 4',sub:'EL GANSO DEL JUICIO',type:'boss', kills:1, bg:'#04040f',gnd:'#080820',spr:999},
];

// Quotes
const QUOTES=[
  ['¡YO SOY NICOLÁS!','#ffd700'],['¡HASTA ATRÁS!','#ff2200'],['¡NI CAGANDO!','#ff8800'],
  ['¡CHAO PESCADO!','#00e5ff'],['¡VAMOS!','#aaffaa'],['¡ARRÁNQUENSE!','#ff2200'],
];

/* ===== HELPERS ===== */
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndi=(a,b)=>Math.floor(rnd(a,b+1));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function shake(n=6){shakeT=Math.max(shakeT,n);}
function part(x,y,col,n=8,spd=3.5,sz=5,life=30){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=spd*(.5+Math.random());
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,r:sz*(.5+Math.random()),life,max:life});
  }
}
function float(x,y,txt,col='#fff',sz=11){
  floats.push({x,y,vy:-1.4-Math.random()*.8,txt,col,sz,life:60,max:60});
}

/* ===== SPAWN ===== */
function spawnEnemy(){
  const cfg=LVLS[level-1];
  const side=rndi(0,3);
  let x=0,y=0;
  if(side===0){x=rnd(30,W-30);y=-35;}
  else if(side===1){x=W+35;y=rnd(30,H-30);}
  else if(side===2){x=rnd(30,W-30);y=H+35;}
  else{x=-35;y=rnd(30,H-30);}
  const e={x,y,vx:0,vy:0,dead:false,flash:0,fr:0};
  if(cfg.type==='chicken')Object.assign(e,{type:'chicken',hp:3,maxHp:3,spd:rnd(2,3),r:15,timer:rndi(25,60),phase:0,sc:50,dmg:1});
  else if(cfg.type==='cow')Object.assign(e,{type:'cow',hp:7,maxHp:7,spd:rnd(1.1,1.9),r:26,mooT:rndi(120,280),sc:100,dmg:1});
  else Object.assign(e,{type:'bull',hp:12,maxHp:12,spd:1.2,r:28,chargeT:rndi(55,100),charging:false,chargeA:0,sc:200,dmg:2});
  enemies.push(e);
}
function spawnBoss(){
  boss={x:580,y:260,hp:600,maxHp:600,r:58,phase:1,atkT:0,moveT:0,dead:false,flash:0,fr:0,vx:0,vy:0,pat:0,sc:8000};
}

function spawnSyringe(){
  pickups.push({x:rnd(60,W-60),y:rnd(60,H-60),life:700,max:700,bob:Math.random()*Math.PI*2,r:18,dead:false});
}
function drawSyringe(p){
  const bob=Math.sin(tick*.065+p.bob)*6;
  const px=p.x,py=p.y+bob;
  // Glow pulse
  const ga=.35+Math.sin(tick*.08+p.bob)*.15;
  g.save();g.translate(px,py);
  g.fillStyle=`rgba(0,200,180,${ga})`;g.beginPath();g.arc(0,0,26,0,Math.PI*2);g.fill();
  g.rotate(Math.PI/4+Math.sin(tick*.03+p.bob)*.1);
  // Syringe barrel
  g.fillStyle='rgba(220,245,245,.92)';g.fillRect(-5,-20,10,30);
  // Teal liquid inside (ozempic!)
  g.fillStyle='#00c8c0';g.fillRect(-3.5,-18,7,24);
  // Graduation marks
  g.strokeStyle='rgba(0,80,80,.6)';g.lineWidth=1;
  for(let i=0;i<4;i++){g.beginPath();g.moveTo(-3.5,-14+i*6);g.lineTo(3.5,-14+i*6);g.stroke();}
  // Plunger top rod
  g.fillStyle='#546e7a';g.fillRect(-2,-28,4,10);
  // Plunger thumb grip (wings)
  g.fillStyle='#546e7a';g.fillRect(-8,-26,16,5);g.fillRect(-5,-30,10,5);
  // Barrel finger flanges
  g.fillStyle='#37474f';g.fillRect(-9,8,18,4);
  // Needle hub
  g.fillStyle='#90a4ae';g.fillRect(-3,10,6,4);
  // Needle
  g.fillStyle='#cfd8dc';g.fillRect(-1,14,2,10);
  g.beginPath();g.moveTo(-1,24);g.lineTo(1,24);g.lineTo(0,29);g.closePath();g.fill();
  g.restore();
  // Label
  g.font='7px "Press Start 2P"';g.textAlign='center';
  g.fillStyle='#00ffe8';g.fillText('OZEMPIC',px,py-30+bob);
  // Fading warning when about to expire
  if(p.life<150){
    const a=p.life/150;g.globalAlpha=a;
    g.fillStyle='#ff8800';g.font='6px "Press Start 2P"';
    g.fillText('¡EXPIRA!',px,py+32+bob);
    g.globalAlpha=1;
  }
}
function drawNicolas(x,y,ang,iframes){
  if(iframes>0&&Math.floor(iframes/4)%2===0)return;
  g.save();g.translate(x,y);g.rotate(ang);
  // Shadow
  g.fillStyle='rgba(0,0,0,.35)';g.beginPath();g.ellipse(0,4,18,7,0,0,Math.PI*2);g.fill();
  // Legs (trailing behind = negative X)
  g.fillStyle='#1a4488';
  g.fillRect(-22,-8,12,7);g.fillRect(-22,1,12,7);
  // Boots
  g.fillStyle='#221100';
  g.fillRect(-26,-10,10,9);g.fillRect(-26,1,10,9);
  // Body (red flannel)
  g.fillStyle='#cc2200';g.fillRect(-14,-13,28,26);
  // Flannel lines
  g.strokeStyle='#991a00';g.lineWidth=2;
  for(let i=-1;i<3;i++){g.beginPath();g.moveTo(-14+i*7,-13);g.lineTo(-14+i*7,13);g.stroke();}
  // Arms
  g.fillStyle='#cc2200';g.fillRect(-12,-18,26,6);g.fillRect(-12,12,26,6);
  // Hands (pale)
  g.fillStyle='#ffe0b2';g.beginPath();g.arc(16,-15,5,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(16,15,5,0,Math.PI*2);g.fill();
  // Weapon (top-down, proper gun shapes)
  const wp=WPNS[wpnLv];
  if(wpnLv===0){
    // PISTOLA — top-down Glock shape
    g.fillStyle='#777';g.fillRect(8,-3,22,6);       // slide
    g.fillStyle='#555';g.fillRect(28,-2,6,4);        // barrel tip
    g.fillStyle='#aaa';g.fillRect(8,-3,5,6);         // rear block
    g.fillStyle='#6a4a28';g.fillRect(8,3,11,9);      // grip (brown)
    g.strokeStyle='#4a3010';g.lineWidth=1;            // grip lines
    for(let i=0;i<3;i++){g.beginPath();g.moveTo(9,5+i*2.5);g.lineTo(18,5+i*2.5);g.stroke();}
    g.strokeStyle='#555';g.lineWidth=1.5;             // trigger guard arc
    g.beginPath();g.arc(19,3,4,.1,Math.PI-.1);g.stroke();
    g.strokeStyle='#333';g.lineWidth=1.5;             // trigger
    g.beginPath();g.moveTo(19,2);g.lineTo(19,5);g.stroke();
  } else if(wpnLv===1){
    // ESCOPETA — pump-action shotgun
    g.fillStyle='#8a6028';g.fillRect(-4,-3,40,6);    // wooden stock+body
    g.fillStyle='#666';g.fillRect(10,-2,30,4);        // metal barrel
    g.fillStyle='#888';g.fillRect(38,-2,8,4);         // muzzle (wider end)
    g.fillStyle='#4a3010';g.fillRect(15,-5,10,10);    // pump grip
    g.strokeStyle='#6a4820';g.lineWidth=1;
    g.beginPath();g.moveTo(-4,-1);g.lineTo(10,-1);g.stroke(); // wood grain
    g.beginPath();g.moveTo(-4,1);g.lineTo(10,1);g.stroke();
    g.fillStyle='#555';g.fillRect(20,-5,4,3);         // sight bead
  } else if(wpnLv===2){
    // AMETRALLADORA — compact SMG
    g.fillStyle='#222';g.fillRect(2,-5,38,10);        // body
    g.fillStyle='#111';g.fillRect(38,-3,10,6);        // barrel
    g.fillStyle=wp.col;g.fillRect(38,-3,2,6);         // muzzle flash hint
    g.fillStyle='#1a1a1a';g.fillRect(10,5,10,14);     // magazine
    g.fillStyle='#333';g.fillRect(2,-5,6,10);         // rear stock
    g.fillStyle='#444';g.fillRect(26,-7,5,3);         // charging handle
    g.strokeStyle='#444';g.lineWidth=1;               // ventilation lines
    for(let i=0;i<4;i++){g.beginPath();g.moveTo(14+i*5,-5);g.lineTo(14+i*5,5);g.stroke();}
    g.fillStyle='#555';g.fillRect(22,-7,4,3);         // rear sight
  } else {
    // LANZACOHETES — military tube launcher
    g.fillStyle='#3a4a1a';g.fillRect(-4,-6,52,12);   // main tube
    g.fillStyle='#2a3a12';g.fillRect(-8,-5,6,10);    // open back end
    g.fillStyle='#ff5500';g.fillRect(44,-5,10,10);   // rocket protruding
    g.fillStyle='#ff8800';g.fillRect(50,-3,4,6);      // rocket tip
    g.fillStyle='#222';g.fillRect(12,-9,5,4);         // front sight post
    g.fillStyle='#222';g.fillRect(28,-9,5,4);         // rear sight
    g.strokeStyle='#2a3a12';g.lineWidth=2;
    g.beginPath();g.moveTo(0,-6);g.lineTo(0,6);g.stroke(); // strap ring
    g.beginPath();g.moveTo(20,-6);g.lineTo(20,6);g.stroke();
    g.fillStyle='#2a2a1a';g.fillRect(14,6,10,10);    // handle grip
  }
  // Head (blonde hair top-down)
  g.fillStyle='#f5d020';g.beginPath();g.arc(6,0,16,0,Math.PI*2);g.fill();
  // Hair whorl
  g.fillStyle='#d4a800';g.strokeStyle='#c49800';g.lineWidth=2;
  g.beginPath();g.arc(8,-3,5,0,Math.PI*2);g.stroke();
  // Face
  g.fillStyle='#ffe0b2';g.beginPath();g.ellipse(8,0,11,10,0,0,Math.PI*2);g.fill();
  // Eyes
  g.fillStyle='#1a1a1a';
  g.beginPath();g.arc(11,-4,2,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(11,4,2,0,Math.PI*2);g.fill();
  // Beard!
  g.fillStyle='#c8a000';
  for(let i=-1;i<2;i++){g.fillRect(3+i*3,3,3,5);}
  g.fillRect(1,1,3,3);g.fillRect(12,1,3,3);
  g.restore();
}

/* ===== DRAW ENEMIES ===== */
function drawChicken(e){
  g.save();g.translate(e.x,e.y);
  if(e.flash>0){g.globalAlpha=.6;}
  const w=Math.sin(e.fr*.2)*6;
  // Body zombie green
  g.fillStyle='#4a7a35';g.beginPath();g.ellipse(w*.2,0,16,12,0,0,Math.PI*2);g.fill();
  // Spots/decay
  g.fillStyle='#2e5520';g.beginPath();g.ellipse(-5,-2,5,4,.3,0,Math.PI*2);g.fill();
  g.beginPath();g.ellipse(6,3,4,3,-.2,0,Math.PI*2);g.fill();
  // Head
  g.fillStyle='#558840';g.beginPath();g.arc(14+w*.3,0,10,0,Math.PI*2);g.fill();
  // Comb (red)
  g.fillStyle='#cc1100';
  g.beginPath();g.moveTo(11,-8);g.lineTo(13,-14);g.lineTo(15,-9);g.lineTo(17,-13);g.lineTo(19,-8);g.lineTo(19,0);g.lineTo(11,0);g.closePath();g.fill();
  // Beak
  g.fillStyle='#bb6600';g.beginPath();g.moveTo(22,-2);g.lineTo(30,0);g.lineTo(22,2);g.closePath();g.fill();
  // RED zombie eyes
  g.fillStyle='#ff0000';g.beginPath();g.arc(12,-3,3.5,0,Math.PI*2);g.fill();g.beginPath();g.arc(17,-3,3.5,0,Math.PI*2);g.fill();
  g.fillStyle='#000';g.beginPath();g.arc(12,-3,1.5,0,Math.PI*2);g.fill();g.beginPath();g.arc(17,-3,1.5,0,Math.PI*2);g.fill();
  // Wings flapping
  g.fillStyle='#3a6a28';
  g.beginPath();g.ellipse(2,-14+w,10,5,-.4,0,Math.PI*2);g.fill();
  g.beginPath();g.ellipse(2,14+w,10,5,.4,0,Math.PI*2);g.fill();
  // Zombie stitches
  g.strokeStyle='#1e3d14';g.lineWidth=1;
  g.beginPath();g.moveTo(-2,-4);g.lineTo(2,4);g.moveTo(6,-2);g.lineTo(4,4);g.stroke();
  g.globalAlpha=1;g.restore();
}
function drawCow(e){
  g.save();g.translate(e.x,e.y);
  if(e.flash>0)g.globalAlpha=.6;
  const wb=Math.sin(e.fr*.1)*4;
  // Body
  g.fillStyle='#f5f5f5';g.beginPath();g.ellipse(0,0,26,18,0,0,Math.PI*2);g.fill();
  // Spots
  g.fillStyle='#1a1a1a';
  g.beginPath();g.ellipse(-8,-4,10,7,-.3,0,Math.PI*2);g.fill();
  g.beginPath();g.ellipse(10,6,8,5,.3,0,Math.PI*2);g.fill();
  // Head
  g.fillStyle='#f0f0f0';g.beginPath();g.ellipse(28+wb,-1,16,12,0,0,Math.PI*2);g.fill();
  // Ears
  g.fillStyle='#ffaaaa';g.beginPath();g.arc(24,-10,5,0,Math.PI*2);g.fill();g.beginPath();g.arc(24,8,5,0,Math.PI*2);g.fill();
  // Crazy spinning eyes
  const es=e.fr*.14;
  g.fillStyle='#fff';g.beginPath();g.arc(27,-5,5.5,0,Math.PI*2);g.fill();g.beginPath();g.arc(27,5,5.5,0,Math.PI*2);g.fill();
  g.fillStyle='#111';g.beginPath();g.arc(27+Math.cos(es)*2,-5+Math.sin(es)*2,2.5,0,Math.PI*2);g.fill();
  g.beginPath();g.arc(27+Math.cos(es+2)*2,5+Math.sin(es+2)*2,2.5,0,Math.PI*2);g.fill();
  // Muzzle
  g.fillStyle='#ffccaa';g.beginPath();g.ellipse(38,0,7,5,0,0,Math.PI*2);g.fill();
  g.fillStyle='#cc8866';g.beginPath();g.arc(36,-1,2,0,Math.PI*2);g.fill();g.beginPath();g.arc(40,-1,2,0,Math.PI*2);g.fill();
  // Udder
  g.fillStyle='#ffbbbb';g.beginPath();g.ellipse(-4,16,12,7,0,0,Math.PI*2);g.fill();
  g.globalAlpha=1;g.restore();
}
function drawBull(e){
  g.save();g.translate(e.x,e.y);
  if(e.flash>0)g.globalAlpha=.6;
  // Charge steam
  if(e.charging){
    g.fillStyle='rgba(255,150,50,.2)';
    for(let i=0;i<3;i++){g.beginPath();g.arc(-20-i*10+Math.sin(e.fr*.3+i)*4,Math.cos(e.fr*.2+i)*4,5+i*2,0,Math.PI*2);g.fill();}
  }
  // Body (massive dark brown)
  g.fillStyle='#4a2e12';g.beginPath();g.ellipse(0,0,28,20,0,0,Math.PI*2);g.fill();
  // Head
  g.fillStyle='#4a2e12';g.beginPath();g.ellipse(26,0,20,15,0,0,Math.PI*2);g.fill();
  // Horns (iconic)
  g.fillStyle='#f0c020';
  g.beginPath();g.moveTo(20,-14);g.lineTo(10,-28);g.lineTo(14,-10);g.closePath();g.fill();
  g.beginPath();g.moveTo(20,14);g.lineTo(10,28);g.lineTo(14,10);g.closePath();g.fill();
  // Angry eyes
  g.fillStyle='#ff0000';g.beginPath();g.arc(24,-5,5.5,0,Math.PI*2);g.fill();g.beginPath();g.arc(24,5,5.5,0,Math.PI*2);g.fill();
  g.fillStyle='#000';g.beginPath();g.arc(24,-5,2.5,0,Math.PI*2);g.fill();g.beginPath();g.arc(24,5,2.5,0,Math.PI*2);g.fill();
  // Angry brow
  g.strokeStyle='#220000';g.lineWidth=3;
  g.beginPath();g.moveTo(18,-10);g.lineTo(26,-7);g.stroke();
  g.beginPath();g.moveTo(26,7);g.lineTo(18,10);g.stroke();
  // Muzzle
  g.fillStyle='#7a3a0a';g.beginPath();g.ellipse(38,0,8,6,0,0,Math.PI*2);g.fill();
  g.fillStyle=e.charging?'#ff8800':'#5a2a06';
  g.beginPath();g.arc(35,-1,2.5,0,Math.PI*2);g.fill();g.beginPath();g.arc(41,-1,2.5,0,Math.PI*2);g.fill();
  // Tail
  g.strokeStyle='#7a3a0a';g.lineWidth=3;
  g.beginPath();g.moveTo(-28,0);g.quadraticCurveTo(-40,-5,-38,-16);g.stroke();
  g.globalAlpha=1;g.restore();
}
function drawGoose(){
  if(!boss)return;
  const bob=Math.sin(boss.fr*.07)*7;
  g.save();g.translate(boss.x,boss.y+bob);
  if(boss.flash>0)g.globalAlpha=.7;
  const ph=boss.phase;
  const wflap=Math.sin(boss.fr*.13)*28;
  // Wings
  g.fillStyle=ph>=3?'#dde0ff':'#f8f8f8';
  g.save();g.rotate((-wflap-22)*Math.PI/180);
  g.beginPath();g.moveTo(0,0);g.lineTo(-75,-18);g.lineTo(-88,12);g.lineTo(-55,32);g.closePath();g.fill();g.restore();
  g.save();g.rotate((wflap+22)*Math.PI/180);
  g.beginPath();g.moveTo(0,0);g.lineTo(75,-18);g.lineTo(88,12);g.lineTo(55,32);g.closePath();g.fill();g.restore();
  // Body
  g.fillStyle=ph>=3?'#e8e8ff':'#f5f5f5';g.beginPath();g.ellipse(0,5,48,36,0,0,Math.PI*2);g.fill();
  // Neck
  g.fillStyle=ph>=3?'#e5e5ff':'#f0f0f0';
  g.beginPath();g.moveTo(-14,-30);g.lineTo(-22,-72);g.lineTo(22,-72);g.lineTo(14,-30);g.closePath();g.fill();
  // Head
  g.fillStyle=ph>=3?'#e5e5ff':'#f5f5f5';g.beginPath();g.arc(0,-88,30,0,Math.PI*2);g.fill();
  // Angry brows
  g.strokeStyle='#880000';g.lineWidth=5;
  g.beginPath();g.moveTo(-16,-100);g.lineTo(0,-95);g.stroke();
  g.beginPath();g.moveTo(16,-100);g.lineTo(0,-95);g.stroke();
  // Beak (big orange)
  g.fillStyle='#ff8800';
  g.beginPath();g.moveTo(-14,-88);g.lineTo(-46,-82);g.lineTo(-14,-75);g.closePath();g.fill();
  g.fillStyle='#cc5500';g.beginPath();g.moveTo(-14,-82);g.lineTo(-46,-82);g.lineTo(-14,-83);g.closePath();g.fill();
  // Eyes
  const eyeCol=ph>=2?'#ff0000':'#cc1100';
  g.fillStyle=eyeCol;g.beginPath();g.arc(-8,-88,8,0,Math.PI*2);g.fill();g.beginPath();g.arc(12,-88,8,0,Math.PI*2);g.fill();
  g.fillStyle='#000';g.beginPath();g.arc(-8,-88,4,0,Math.PI*2);g.fill();g.beginPath();g.arc(12,-88,4,0,Math.PI*2);g.fill();
  g.fillStyle='rgba(255,255,255,.7)';g.beginPath();g.arc(-6,-90,2,0,Math.PI*2);g.fill();g.beginPath();g.arc(14,-90,2,0,Math.PI*2);g.fill();
  // Feet
  g.strokeStyle='#ff8800';g.lineWidth=5;
  g.beginPath();g.moveTo(-18,38);g.lineTo(-26,58);g.moveTo(-26,58);g.lineTo(-40,58);g.moveTo(-26,58);g.lineTo(-26,68);g.moveTo(-26,58);g.lineTo(-16,68);g.stroke();
  g.beginPath();g.moveTo(18,38);g.lineTo(26,58);g.moveTo(26,58);g.lineTo(40,58);g.moveTo(26,58);g.lineTo(26,68);g.moveTo(26,58);g.lineTo(16,68);g.stroke();
  // Phase 3 evil aura
  if(ph>=3){g.strokeStyle='rgba(80,80,255,.7)';g.lineWidth=5;g.setLineDash([8,4]);g.beginPath();g.arc(0,0,62,0,Math.PI*2);g.stroke();g.setLineDash([]);}
  g.globalAlpha=1;g.restore();
  // HP bar
  const bw=320,bx=(W-bw)/2;
  g.fillStyle='rgba(0,0,0,.75)';g.fillRect(bx-5,8,bw+10,22);
  g.fillStyle='#330000';g.fillRect(bx,10,bw,18);
  const pct=boss.hp/boss.maxHp;
  g.fillStyle=pct>.6?'#ff2200':pct>.3?'#ff8800':'#ff0055';
  g.fillRect(bx,10,bw*pct,18);
  g.strokeStyle='#ff0000';g.lineWidth=1;g.strokeRect(bx,10,bw,18);
  g.fillStyle='#fff';g.font='7px "Press Start 2P"';g.textAlign='center';
  g.fillText('👻 EL GANSO DEL JUICIO FINAL 👻',W/2,22);
  g.textAlign='left';
}

/* ===== SHOOT ===== */
function shoot(){
  const wp=WPNS[wpnLv];
  if(PL.fireCd>0)return;
  PL.fireCd=wp.cd;
  const base=Math.atan2(my-PL.y,mx-PL.x);
  for(let i=0;i<wp.sh;i++){
    const a=base+(Math.random()-.5)*wp.spread+(wp.sh>1?(i-(wp.sh-1)/2)*.13:0);
    bullets.push({x:PL.x+Math.cos(PL.angle)*22,y:PL.y+Math.sin(PL.angle)*22,
      vx:Math.cos(a)*wp.spd,vy:Math.sin(a)*wp.spd,
      dmg:wp.dmg,r:wpnLv===3?7:4,col:wp.col,life:90,dead:false,
      type:wp.expl?'rocket':'bullet',team:'player'});
  }
  part(PL.x+Math.cos(PL.angle)*24,PL.y+Math.sin(PL.angle)*24,wp.col,4,4,3,12);
}
function explode(x,y,r=72){
  shake(14);
  part(x,y,'rgba(255,160,30,',20,9,14,45);
  part(x,y,'rgba(255,60,0,',12,6,8,32);
  part(x,y,'rgba(255,255,120,',8,11,4,22);
  float(x,y-20,'💥 BOOM!','#ff8800',15);
  for(const e of enemies){if(dist(e,{x,y})<r){e.hp-=999;e.flash=10;}}
  if(boss&&dist(boss,{x,y})<r+30){boss.hp-=999;boss.flash=12;}
}

/* ===== ENEMY AI ===== */
function updateEnemy(e){
  if(e.dead)return;
  e.fr++;if(e.flash>0)e.flash--;
  const dx=PL.x-e.x,dy=PL.y-e.y,d=Math.hypot(dx,dy)||1;
  if(e.type==='chicken'){
    e.timer--;if(e.timer<=0){e.phase=(e.phase+1)%2;e.timer=rndi(18,55);}
    if(e.phase===0){e.vx+=(dx/d)*e.spd*.22;e.vy+=(dy/d)*e.spd*.22;}
    else{e.vx+=(Math.random()-.5)*.9;e.vy+=(Math.random()-.5)*.9;}
    const ms=e.spd;const s=Math.hypot(e.vx,e.vy);
    if(s>ms){e.vx=e.vx/s*ms;e.vy=e.vy/s*ms;}
    e.vx*=.9;e.vy*=.9;
  } else if(e.type==='cow'){
    e.mooT--;if(e.mooT<=0){
      e.mooT=rndi(100,250);shake(3);
      float(e.x,e.y-30,'🐄 MUUU!','#eeeeee',9);
    }
    e.vx+=(dx/d)*e.spd*.12+(Math.random()-.5)*.4;
    e.vy+=(dy/d)*e.spd*.12+(Math.random()-.5)*.4;
    const ms=e.spd*1.5;const s=Math.hypot(e.vx,e.vy);
    if(s>ms){e.vx=e.vx/s*ms;e.vy=e.vy/s*ms;}
    e.vx*=.86;e.vy*=.86;
  } else if(e.type==='bull'){
    e.chargeT--;
    if(!e.charging){
      if(e.chargeT<=0){
        e.charging=true;e.chargeT=50;e.chargeA=Math.atan2(dy,dx);
        shake(5);float(e.x,e.y-30,'🐂 VOOOOY!','#ff1100',11);
      } else{e.vx+=dx/d*.35;e.vy+=dy/d*.35;e.vx*=.78;e.vy*=.78;}
    } else {
      e.vx=Math.cos(e.chargeA)*8.5;e.vy=Math.sin(e.chargeA)*8.5;
      if(e.chargeT<=0){e.charging=false;e.chargeT=rndi(65,110);}
    }
  }
  e.x+=e.vx;e.y+=e.vy;
  if(e.x<e.r){e.x=e.r;e.vx=Math.abs(e.vx);}
  if(e.x>W-e.r){e.x=W-e.r;e.vx=-Math.abs(e.vx);}
  if(e.y<e.r){e.y=e.r;e.vy=Math.abs(e.vy);}
  if(e.y>H-e.r){e.y=H-e.r;e.vy=-Math.abs(e.vy);}
}
function updateBoss(){
  if(!boss||boss.dead)return;
  boss.fr++;if(boss.flash>0)boss.flash--;boss.atkT--;
  if(boss.hp<boss.maxHp*.65&&boss.phase===1){
    boss.phase=2;shake(16);float(W/2,H/2-30,'¡FASE 2! ¡MÁS ENOJADO!','#ff8800',16);
  }
  if(boss.hp<boss.maxHp*.3&&boss.phase===2){
    boss.phase=3;shake(22);float(W/2,H/2-30,'¡FASE 3! ¡FURIA TOTAL!','#ff0055',20);
  }
  // Movement
  boss.moveT+=.018+(boss.phase-1)*.008;
  const tx=W/2+Math.cos(boss.moveT)*230,ty=H/2+Math.sin(boss.moveT*1.6)*115;
  boss.vx+=(tx-boss.x)*.022;boss.vy+=(ty-boss.y)*.022;
  boss.vx*=.9;boss.vy*=.9;
  boss.x+=boss.vx;boss.y+=boss.vy;
  // Attack
  if(boss.atkT<=0){
    boss.atkT=Math.floor(130/boss.phase);
    boss.pat=(boss.pat+1)%3;
    const ang=Math.atan2(PL.y-boss.y,PL.x-boss.x);
    if(boss.pat===0){// direct shots
      const n=boss.phase>=2?3:1;
      for(let i=0;i<n;i++){
        const a=ang+(i-(n-1)/2)*.22;
        bullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*6,vy:Math.sin(a)*6,dmg:1,r:9,col:'#ff8800',life:130,dead:false,type:'enemy',team:'enemy'});
      }
      float(boss.x,boss.y-75,'HONK!!','#ff8800',15);
    } else if(boss.pat===1){// spread
      const n=6+boss.phase*4;
      for(let i=0;i<n;i++){
        const a=i/n*Math.PI*2;
        bullets.push({x:boss.x,y:boss.y,vx:Math.cos(a)*3.8,vy:Math.sin(a)*3.8,dmg:1,r:7,col:'#f0f0f0',life:110,dead:false,type:'feather',team:'enemy'});
      }
    } else {// egg bomb
      bullets.push({x:boss.x,y:boss.y-50,vx:Math.cos(ang)*3.5,vy:Math.sin(ang)*3.5,
        dmg:1,r:11,col:'#fffacc',life:160,dead:false,type:'egg',team:'enemy'});
    }
  }
}

/* ===== DAMAGE ===== */
function hurtPlayer(){
  if(PL.iframes>0)return;
  lives--;shake(16);PL.iframes=110;
  float(PL.x,PL.y-35,'¡AY DIOS!','#ff0000',14);
  part(PL.x,PL.y,'rgba(255,60,60,',10,4,6,30);
  if(lives<=0){if(score>hi)hi=score;ST='gameover';}
}
function killEnemy(e){
  if(e.dead)return;e.dead=true;wKills++;
  const mul=1+Math.min(combo,12)*.12;
  score+=Math.floor(e.sc*mul);combo++;comboT=100;
  checkWpnUp();
  const msg=e.type==='chicken'?['¡PLUMAS!','¡KFC ZOMBIE!','¡FRITA!']:
            e.type==='cow'?['¡HAMBURGUESA!','¡ADIOS VACA!','¡CHURRASCO!']:
            ['¡OLÉ!','¡TORO ABAJO!','¡CHAO!'];
  float(e.x,e.y-22,msg[rndi(0,msg.length-1)],'#ffd700',10);
  const col=e.type==='chicken'?'rgba(100,200,80,':e.type==='cow'?'rgba(240,240,220,':'rgba(255,80,30,';
  part(e.x,e.y,col,14,5,7,35);
  const cfg=LVLS[level-1];
  if(wKills>=cfg.kills&&level<4)startTrans();
}
function killBoss(){
  if(!boss||boss.dead)return;boss.dead=true;
  score+=boss.sc;shake(28);
  part(boss.x,boss.y,'rgba(255,215,0,',35,11,16,90);
  part(boss.x,boss.y,'rgba(255,255,255,',22,9,10,65);
  float(boss.x,boss.y-80,'¡¡GANSO DERROTADO!!','#ffd700',20);
  float(boss.x,boss.y-120,'¡HASTA ATRÁS!','#ff2200',24);
  for(let i=0;i<8;i++)setTimeout(()=>{part(boss.x+rnd(-80,80),boss.y+rnd(-60,60),'rgba(255,'+(rndi(100,255))+',0,',10,6,10,40);},i*220);
  setTimeout(()=>{if(score>hi)hi=score;ST='victory';},3500);
}
function checkWpnUp(){
  for(let i=WPNUP.length-1;i>0;i--){
    if(score>=WPNUP[i]&&wpnLv<i){
      wpnLv=i;shake(8);
      float(PL.x,PL.y-55,'⬆ '+WPNS[i].nm,'#00e5ff',12);
      break;
    }
  }
}
function startTrans(){ST='transition';transTmr=200;enemies=[];bullets=[];pickups=[];pickups._spawned=false;pickupTmr=350;}
function startBoss(){level=4;ST='playing';wKills=0;enemies=[];bullets=[];pickups=[];pickups._spawned=false;pickupTmr=350;spawnBoss();}

/* ===== START / RESET ===== */
function startGame(){
  level=1;score=0;lives=3;tick=0;wpnLv=0;wKills=0;combo=0;comboT=0;
  enemies=[];bullets=[];parts=[];floats=[];pickups=[];pickups._spawned=false;boss=null;shakeT=0;pickupTmr=350;
  PL.x=W/2;PL.y=H/2;PL.iframes=0;PL.fireCd=0;autoFire=false;
  ST='playing';
}

/* ===== INPUT ===== */
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault();
    if(ST==='menu'||ST==='gameover'||ST==='victory'){startGame();return;}
    autoFire=!autoFire;
  }
  if(e.code==='Enter'&&(ST==='menu'||ST==='gameover'||ST==='victory'))startGame();
});
document.addEventListener('keyup',e=>keys[e.code]=false);
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(),sc=W/r.width;mx=(e.clientX-r.left)*sc;my=(e.clientY-r.top)*sc;});
cv.addEventListener('click',e=>{
  if(ST==='menu'||ST==='gameover'||ST==='victory'){startGame();return;}
  autoFire=true;
});
cv.addEventListener('mousedown',()=>{if(ST==='playing')autoFire=true;});

/* ===== BG ===== */
function drawBG(){
  const cfg=LVLS[Math.min(level-1,3)];
  g.fillStyle=cfg.bg;g.fillRect(0,0,W,H);
  g.fillStyle=cfg.gnd;
  for(let x=0;x<W;x+=44)for(let y=0;y<H;y+=44)if(((x/44)+(y/44))%2===0)g.fillRect(x,y,44,44);
  g.strokeStyle='rgba(255,255,255,.035)';g.lineWidth=1;
  for(let x=0;x<W;x+=44){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();}
  for(let y=0;y<H;y+=44){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke();}
  const vg=g.createRadialGradient(W/2,H/2,W*.18,W/2,H/2,W*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,.6)');
  g.fillStyle=vg;g.fillRect(0,0,W,H);
}

/* ===== HUD ===== */

    g.strokeStyle='#0088aa';g.lineWidth=1;g.strokeRect(118,44,234,14);

  }

  const wp=WPNS[wpnLv];
  g.fillStyle='rgba(0,0,0,.65)';g.fillRect(0,H-44,280,44);
  g.fillStyle=wp.col;g.font='8px "Press Start 2P"';
  g.fillText(wp.nm,10,H-26);
  for(let i=0;i<4;i++){
    g.fillStyle=i<=wpnLv?wp.col:'#333';

  }

  if(wpnLv<3){

    g.fillText('x'+combo+' COMBO!',W/2,H-62);g.globalAlpha=1;
  }
  // Auto fire indicator
  g.fillStyle=autoFire?'#00ff88':'#ff5555';
  g.textAlign='right';g.font='6px "Press Start 2P"';
  g.fillText(autoFire?'DISPARO: ON ●':'DISPARO: OFF ○',W-8,H-18);
  g.textAlign='left';
}

/* ===== MAIN LOOP ===== */
function update(){
  if(ST!=='playing'&&ST!=='transition')return;
  tick++;if(shakeT>0)shakeT--;
  if(comboT>0)comboT--;else if(comboT===0&&combo>0)combo=0;
  if(PL.iframes>0)PL.iframes--;
  if(PL.fireCd>0)PL.fireCd--;
  if(ST==='transition'){
    transTmr--;
    if(transTmr<=0){
      level++;wKills=0;enemies=[];bullets=[];
      if(level>=4)startBoss();else ST='playing';
    }
    return;
  }
  // Player movement
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx-=1;
  if(keys['ArrowRight']||keys['KeyD'])dx+=1;
  if(keys['ArrowUp']||keys['KeyW'])dy-=1;
  if(keys['ArrowDown']||keys['KeyS'])dy+=1;
  if(dx||dy){const d=Math.hypot(dx,dy);dx/=d;dy/=d;}
  PL.x=Math.max(18,Math.min(W-18,PL.x+dx*PL.spd));
  PL.y=Math.max(18,Math.min(H-18,PL.y+dy*PL.spd));
  PL.angle=Math.atan2(my-PL.y,mx-PL.x);
  // Auto fire
  if(autoFire&&PL.fireCd===0)shoot();
  // Random Nicolás quote
  if(tick%600===0&&Math.random()>.4){
    const q=QUOTES[rndi(0,QUOTES.length-1)];
    float(PL.x,PL.y-50,q[0],q[1],10);
  }
  // Spawn
  if(level<4){
    spawnTmr--;
    if(spawnTmr<=0){
      const cfg=LVLS[level-1];
      if(enemies.length<20)spawnEnemy();
      spawnTmr=Math.max(28,cfg.spr-Math.floor(wKills*2.2));
    }
  }
  // Update enemies
  for(const e of enemies)if(!e.dead)updateEnemy(e);
  enemies=enemies.filter(e=>!e.dead);
  if(boss&&!boss.dead)updateBoss();
  // Bullets
  for(const b of bullets){
    if(b.dead)continue;
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.type==='egg'){b.vy+=.1;}
    if(b.life<=0||b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){
      if(b.type==='rocket')explode(b.x,b.y);
      if(b.type==='egg'){part(b.x,b.y,'rgba(255,240,150,',8,3,6,25);shake(5);}
      b.dead=true;continue;
    }
    if(b.team==='player'){
      for(const e of enemies){
        if(!e.dead&&dist(b,e)<e.r+b.r){
          e.hp-=b.dmg;e.flash=10;
          part(b.x,b.y,'rgba(255,200,60,',4,3,3,14);
          if(b.type==='rocket')explode(b.x,b.y);
          b.dead=true;
          if(e.hp<=0)killEnemy(e);
          break;
        }
      }
      if(!b.dead&&boss&&!boss.dead&&dist(b,boss)<boss.r+b.r){
        boss.hp-=b.dmg;boss.flash=8;
        part(b.x,b.y,'rgba(255,210,100,',4,3,3,14);
        if(b.type==='rocket')explode(b.x,b.y);
        b.dead=true;
        if(boss.hp<=0)killBoss();
      }
    } else if(b.team==='enemy'&&dist(b,PL)<PL.r+b.r){
      hurtPlayer();b.dead=true;
    }
  }
  bullets=bullets.filter(b=>!b.dead);
  // Enemy contact
  for(const e of enemies)if(!e.dead&&dist(e,PL)<e.r+PL.r)hurtPlayer();
  if(boss&&!boss.dead&&dist(boss,PL)<boss.r+PL.r-10)hurtPlayer();
  // Spawn 1 Ozempic syringe per level
  pickupTmr--;
  if(pickupTmr<=0&&pickups.length===0&&!pickups._spawned){spawnSyringe();pickups._spawned=true;}
  // Update & collect pickups
  for(const p of pickups){
    p.life--;if(p.life<=0)p.dead=true;
    if(!p.dead&&dist(p,PL)<p.r+PL.r){
      p.dead=true;
      lives=Math.min(lives+1,6);
      shake(6);
      float(PL.x,PL.y-45,'💉 +1 VIDA','#00ffe8',12);
      part(PL.x,PL.y,'rgba(0,220,180,',12,5,6,35);
    }
  }
  pickups=pickups.filter(p=>!p.dead);
  // Particles/floats
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life--;}
  parts=parts.filter(p=>p.life>0);
  for(const f of floats){f.x+=(Math.random()-.5)*.5;f.y+=f.vy;f.life--;}
  floats=floats.filter(f=>f.life>0);
}

function render(){
  g.clearRect(0,0,W,H);
  g.save();
  if(shakeT>0)g.translate((Math.random()-.5)*shakeT*.8,(Math.random()-.5)*shakeT*.8);
  drawBG();
  if(ST==='playing'||ST==='transition'){
    // Pickups (Ozempic syringes)
    for(const p of pickups)if(!p.dead)drawSyringe(p);
    // Enemies
    for(const e of enemies){
      if(e.type==='chicken')drawChicken(e);
      else if(e.type==='cow')drawCow(e);
      else if(e.type==='bull')drawBull(e);
    }
    // Boss
    if(boss&&!boss.dead)drawGoose();
    // Particles
    for(const p of parts){
      const a=p.life/p.max;
      g.fillStyle=p.col+a+')';g.beginPath();g.arc(p.x,p.y,p.r*(a*.6+.4),0,Math.PI*2);g.fill();
    }
    // Enemy bullets
    for(const b of bullets){
      if(b.team!=='enemy')continue;
      if(b.type==='feather'){
        g.save();g.translate(b.x,b.y);g.rotate(Math.atan2(b.vy,b.vx));
        g.fillStyle='#eeeeff';g.beginPath();g.ellipse(0,0,8,3,0,0,Math.PI*2);g.fill();
        g.restore();
      } else if(b.type==='egg'){
        g.fillStyle='#fffacc';g.beginPath();g.ellipse(b.x,b.y,11,9,.2,0,Math.PI*2);g.fill();
        g.strokeStyle='#cccc88';g.lineWidth=1;g.stroke();
      } else {
        g.fillStyle=b.col;g.beginPath();g.arc(b.x,b.y,b.r,0,Math.PI*2);g.fill();
        g.fillStyle='rgba(255,150,0,.3)';g.beginPath();g.arc(b.x,b.y,b.r+4,0,Math.PI*2);g.fill();
      }
    }
    // Player bullets
    for(const b of bullets){
      if(b.team!=='player')continue;
      if(b.type==='rocket'){
        g.save();g.translate(b.x,b.y);g.rotate(Math.atan2(b.vy,b.vx));
        g.fillStyle='#888';g.fillRect(-12,-4,18,8);
        g.fillStyle='#ff5500';g.beginPath();g.arc(-12,0,5,0,Math.PI*2);g.fill();
        g.fillStyle='rgba(255,140,0,.6)';g.beginPath();g.arc(-18,0,8,0,Math.PI*2);g.fill();
        g.restore();
      } else {
        g.fillStyle=b.col;g.beginPath();g.arc(b.x,b.y,b.r,0,Math.PI*2);g.fill();
        if(wpnLv===2){g.fillStyle='rgba(0,229,255,.25)';g.beginPath();g.arc(b.x,b.y,b.r+4,0,Math.PI*2);g.fill();}
        if(wpnLv===1){g.fillStyle='rgba(255,180,0,.3)';g.beginPath();g.arc(b.x,b.y,b.r+5,0,Math.PI*2);g.fill();}
      }
    }
    // Floaters
    for(const f of floats){
      const a=Math.min(f.life/f.max*2,1);g.globalAlpha=a;
      g.fillStyle=f.col;g.font=f.sz+'px "Press Start 2P"';g.textAlign='center';
      g.fillText(f.txt,f.x,f.y);g.globalAlpha=1;
    }
    // Player
    drawNicolas(PL.x,PL.y,PL.angle,PL.iframes);
    // Crosshair
    g.strokeStyle='rgba(255,255,255,.6)';g.lineWidth=1.5;
    g.beginPath();g.arc(mx,my,11,0,Math.PI*2);g.stroke();
    g.beginPath();g.moveTo(mx-17,my);g.lineTo(mx-6,my);g.stroke();
    g.beginPath();g.moveTo(mx+6,my);g.lineTo(mx+17,my);g.stroke();
    g.beginPath();g.moveTo(mx,my-17);g.lineTo(mx,my-6);g.stroke();
    g.beginPath();g.moveTo(mx,my+6);g.lineTo(mx,my+17);g.stroke();
    drawHUD();
    // Transition card
    if(ST==='transition'&&transTmr<160){
      const a=Math.min((160-transTmr)/30,1);
      g.fillStyle=`rgba(0,0,0,${a*.88})`;g.fillRect(0,0,W,H);
      if(transTmr<140){
        g.textAlign='center';
        g.fillStyle='#ffd700';g.font='20px "Press Start 2P"';
        g.fillText('¡NIVEL '+level+' COMPLETADO!',W/2,H/2-28);
        g.fillStyle='white';g.font='10px "Press Start 2P"';
        g.fillText('SIGUIENTE: '+LVLS[Math.min(level,3)].sub,W/2,H/2+10);
        if(transTmr<90){
          g.fillStyle='#aaa';g.font='7px "Press Start 2P"';
          g.fillText('Preparando siguiente nivel...',W/2,H/2+40);
        }
        g.textAlign='left';
      }
    }
  }
  // MENU
  if(ST==='menu'){
    drawBG();
    g.fillStyle='rgba(0,0,0,.72)';g.fillRect(0,0,W,H);
    // Title
    g.textAlign='center';
    g.fillStyle='#ff2200';g.font='28px "Press Start 2P"';g.fillText('HASTA ATRÁS',W/2,140);
    g.fillStyle='#ffd700';g.font='20px "Press Start 2P"';g.fillText('NICOLÁS',W/2,178);
    drawNicolas(W/2,H/2+55,0,0);
    // Level previews
    g.fillStyle='#444';g.font='7px "Press Start 2P"';
    g.fillText('🐔 GALLINAS ZOMBIE  →  🐄 VACAS LOCAS  →  🐂 TOROS  →  👻 GANSO JEFE',W/2,H/2+116);
    if(Math.floor(tick/30)%2===0){g.fillStyle='#fff';g.font='9px "Press Start 2P"';g.fillText('CLICK / ESPACIO para empezar',W/2,H/2+148);}
    g.fillStyle='#555';g.font='6px "Press Start 2P"';
    g.fillText('3 VIDAS  ·  4 ARMAS  ·  4 NIVELES  ·  1 GANSO MUY ENOJADO',W/2,H-18);
    g.textAlign='left';
  }
  // GAME OVER
  if(ST==='gameover'){
    drawBG();
    g.fillStyle='rgba(0,0,0,.82)';g.fillRect(0,0,W,H);
    g.textAlign='center';
    g.fillStyle='#ff0000';g.font='26px "Press Start 2P"';g.fillText('NICOLÁS CAE...',W/2,H/2-80);
    g.fillStyle='#ff6600';g.font='12px "Press Start 2P"';g.fillText('...HASTA ATRÁS',W/2,H/2-44);
    g.fillStyle='#ffd700';g.font='13px "Press Start 2P"';g.fillText('PUNTAJE: '+Math.floor(score),W/2,H/2+4);
    g.fillStyle='#888';g.font='8px "Press Start 2P"';g.fillText('MEJOR: '+Math.floor(hi),W/2,H/2+28);
    const lvlName=LVLS[level-1].sub;
    g.fillStyle='#aaa';g.font='7px "Press Start 2P"';g.fillText('CAÍDO EN: '+lvlName,W/2,H/2+50);
    if(Math.floor(tick/28)%2===0){g.fillStyle='white';g.font='8px "Press Start 2P"';g.fillText('CLICK / ESPACIO para reintentar',W/2,H/2+82);}
    g.textAlign='left';
  }
  // VICTORY
  if(ST==='victory'){
    drawBG();
    g.fillStyle='rgba(0,0,10,.82)';g.fillRect(0,0,W,H);
    // Stars
    for(let i=0;i<40;i++){
      const sx=(i*157+tick*((i%5)+1))%W,sy=(i*103+tick*.5*(i%3))%H;
      const a=Math.sin(tick*.05+i)*.5+.5;
      g.fillStyle=`rgba(255,215,0,${a})`;g.beginPath();g.arc(sx,sy,2.5,0,Math.PI*2);g.fill();
    }
    g.textAlign='center';
    g.fillStyle='#ffd700';g.font='26px "Press Start 2P"';g.fillText('¡VICTORIA TOTAL!',W/2,H/2-100);
    g.fillStyle='#00e5ff';g.font='10px "Press Start 2P"';g.fillText('NICOLÁS LIMPIÓ EL CAMPO',W/2,H/2-66);
    g.fillStyle='#ff4400';g.font='12px "Press Start 2P"';g.fillText('¡HASTA ATRÁS TODOS!',W/2,H/2-38);
    drawNicolas(W/2,H/2+30,0,0);
    g.fillStyle='#ffd700';g.font='13px "Press Start 2P"';g.fillText('PUNTAJE FINAL: '+Math.floor(score),W/2,H/2+104);
    if(score>=hi){g.fillStyle='#ff8800';g.font='8px "Press Start 2P"';g.fillText('¡NUEVO RÉCORD!',W/2,H/2+126);}
    if(Math.floor(tick/28)%2===0){g.fillStyle='white';g.font='8px "Press Start 2P"';g.fillText('CLICK para jugar de nuevo',W/2,H-22);}
    g.textAlign='left';
  }
  g.restore();
  tick++;
}

function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
