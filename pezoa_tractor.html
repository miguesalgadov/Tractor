<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pezoa - El Tractor del Sabor</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a120a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;padding:12px}
#wrap{width:800px;max-width:100vw}
h1{color:#f39c12;font-size:clamp(12px,3vw,22px);text-align:center;margin-bottom:4px;text-shadow:3px 3px 0 #7a5000,0 0 20px rgba(243,156,18,.4)}
.sub{color:#c8a96a;font-size:clamp(5px,1.2vw,9px);text-align:center;margin-bottom:8px;letter-spacing:2px}
canvas{display:block;width:100%;border:3px solid #f39c12;border-radius:10px;box-shadow:0 0 30px rgba(243,156,18,.3),0 0 60px rgba(243,156,18,.1);cursor:pointer}
.ctrl{color:#555;font-size:clamp(4px,.9vw,7px);text-align:center;margin-top:7px;letter-spacing:1px}
</style>
</head>
<body>
<div id="wrap">
  <h1>🚜 PEZOA</h1>
  <div class="sub">EL TRACTOR DEL SABOR</div>
  <canvas id="c" width="800" height="300"></canvas>
  <div class="ctrl">ESPACIO / FLECHA ARRIBA / CLICK / TAP → SALTAR &nbsp;|&nbsp; Recoge ⚙ piezas para modernizar el tractor!</div>
</div>
<script>
const cv=document.getElementById('c');
const g=cv.getContext('2d');
const W=800,H=300,GY=242;

let gs={on:false,over:false,frame:0,score:0,hi:0,speed:3,parts:0,level:0,flash:0};
const UPG=[
  {need:0, spd:3.0,  txt:'CHATARRA RODANTE'},
  {need:3, spd:4.5,  txt:'ALGO MEJORADO'},
  {need:6, spd:6.2,  txt:'VA FUNCIONANDO'},
  {need:9, spd:8.5,  txt:'MODERNIZADO'},
  {need:12,spd:10.5, txt:'TRACTOR DEL SABOR!'},
];

let pl={x:115,y:GY,vy:0,gr:true,wRot:0,JUMP:-15,GRAV:.58,W:105,H:78};
let obs=[],pcs=[],pars=[];
let oTmr=80,pTmr=400;

let bg={clouds:[],hills:[],trees:[],deco:[]};
for(let i=0;i<5;i++) bg.clouds.push({x:i*170+40,y:25+Math.random()*45,w:70+Math.random()*50});
for(let i=0;i<4;i++) bg.hills.push({x:i*220,h:45+Math.random()*35,w:210});
for(let i=0;i<14;i++) bg.trees.push({x:i*60+Math.random()*20,h:20+Math.random()*20,t:Math.random()>.5?0:1});
for(let i=0;i<28;i++) bg.deco.push({x:i*30+Math.random()*12,t:Math.floor(Math.random()*3)});

function jump(){
  if(gs.over){restart();return;}
  if(!gs.on){gs.on=true;return;}
  if(pl.gr){pl.vy=pl.JUMP;pl.gr=false;dust(pl.x+50,GY,7);}
}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}});
cv.addEventListener('click',jump);
cv.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function spawnObs(){
  const t=[
    {n:'hay',w:40,h:40},{n:'rock',w:46,h:28},
    {n:'fence',w:16,h:58},{n:'barrel',w:32,h:42},
  ][Math.floor(Math.random()*4)];
  obs.push({...t,x:W+10,y:GY-t.h});
}
function spawnPc(){
  if(gs.level>=4)return;
  pcs.push({x:W+20,y:GY-98-Math.random()*18,bob:Math.random()*Math.PI*2});
}
function dust(x,y,n,col='rgba(180,140,70,'){
  for(let i=0;i<n;i++) pars.push({x,y,vx:(Math.random()-.5)*3.5,vy:-(Math.random()*3.5+.8),life:28,max:28,r:3+Math.random()*4,col});
}
function smoke(x,y){
  if(Math.random()>.35)return;
  pars.push({x,y,vx:-gs.speed*(gs.level>=4?.25:.5),vy:-(0.3+Math.random()*.5),life:35+Math.random()*20,max:55,r:4+gs.level*1.8+Math.random()*4,col:gs.level>=4?'rgba(210,210,210,':'rgba(90,90,90,'});
}

function wheel(wx,wy,wr,rot,lv){
  const tc=['#2a2a2a','#1e1e1e','#161616','#0f0f0f','#080808'][lv];
  const rc=['#575757','#686868','#797979','#8a8a8a',lv>=4?'#c8a000':'#9b9b9b'][lv];
  g.fillStyle=tc;g.beginPath();g.arc(wx,wy,wr,0,Math.PI*2);g.fill();
  if(lv>=2){g.strokeStyle='#2a2a2a';g.lineWidth=4;g.setLineDash([9,9]);g.beginPath();g.arc(wx,wy,wr-2,0,Math.PI*2);g.stroke();g.setLineDash([]);}
  else{g.strokeStyle='#3d3d3d';g.lineWidth=2;g.beginPath();g.arc(wx,wy,wr-2,0,Math.PI*2);g.stroke();}
  g.strokeStyle=rc;g.lineWidth=3;g.beginPath();g.arc(wx,wy,wr-8,0,Math.PI*2);g.stroke();
  const sp=lv>=3?6:4;g.strokeStyle=rc;g.lineWidth=2.5;
  for(let i=0;i<sp;i++){const a=rot+i/sp*Math.PI*2;g.beginPath();g.moveTo(wx,wy);g.lineTo(wx+Math.cos(a)*(wr-10),wy+Math.sin(a)*(wr-10));g.stroke();}
  g.fillStyle=rc;g.beginPath();g.arc(wx,wy,7,0,Math.PI*2);g.fill();
  g.fillStyle='#111';g.beginPath();g.arc(wx,wy,3,0,Math.PI*2);g.fill();
}

const TC=[
  {bo:'#7a3310',ho:'#9c4a1e',ca:'#5e2208',ac:'#bf7030',wi:'rgba(90,140,160,.4)',ex:'#383838'},
  {bo:'#8a5710',ho:'#aa6720',ca:'#704508',ac:'#d4a020',wi:'rgba(120,170,195,.5)',ex:'#282828'},
  {bo:'#3a6810',ho:'#4a7820',ca:'#2a5808',ac:'#85b820',wi:'rgba(165,215,185,.6)',ex:'#181818'},
  {bo:'#1a6618',ho:'#2a7628',ca:'#0a5610',ac:'#60cc40',wi:'rgba(185,238,205,.7)',ex:'#0a0a0a'},
  {bo:'#124e10',ho:'#186618',ca:'#083808',ac:'#ffd700',wi:'rgba(210,250,255,.9)',ex:'#000'},
];
function tractor(bx,by,lv,wRot,shY){
  by+=shY;
  const C=TC[lv];
  const rWx=bx+30,rWy=by-30,rWr=30;
  const fWx=bx+88,fWy=by-19,fWr=19;
  g.fillStyle='rgba(0,0,0,.2)';g.beginPath();g.ellipse(bx+55,by+3,56,7,0,0,Math.PI*2);g.fill();
  wheel(rWx,rWy,rWr,wRot,lv);
  wheel(fWx,fWy,fWr,wRot*1.65,lv);
  g.fillStyle=C.bo;g.fillRect(bx+18,by-54,65,29);
  g.fillStyle=C.ho;g.beginPath();g.moveTo(bx+63,by-54);g.lineTo(bx+92,by-46);g.lineTo(bx+92,by-25);g.lineTo(bx+63,by-25);g.closePath();g.fill();
  if(lv>=1){g.strokeStyle='rgba(0,0,0,.22)';g.lineWidth=1.5;for(let i=0;i<3;i++){g.beginPath();g.moveTo(bx+66,by-50+i*8);g.lineTo(bx+90,by-44+i*8);g.stroke();}}
  g.fillStyle='#1e1e1e';g.fillRect(bx+14,by-25,80,7);
  g.fillStyle=C.ca;g.fillRect(bx+14,by-84,44,32);
  if(lv>=2){g.fillStyle=C.ac;g.fillRect(bx+14,by-84,44,5);}
  g.fillStyle=C.wi;g.fillRect(bx+18,by-77,15,15);g.fillRect(bx+37,by-77,17,15);
  g.fillStyle='rgba(255,255,255,.22)';g.fillRect(bx+19,by-76,5,5);g.fillRect(bx+38,by-76,6,5);
  g.fillStyle=C.ex;g.fillRect(bx+71,by-71,9,19);g.fillRect(bx+69,by-74,13,6);
  if(lv>=1){
    g.fillStyle=lv>=3?'#ffe566':'#fffbd0';
    g.beginPath();g.arc(bx+93,by-37,lv>=3?6:4,0,Math.PI*2);g.fill();
    if(lv>=3){const rg=g.createRadialGradient(bx+93,by-37,0,bx+93,by-37,55);rg.addColorStop(0,'rgba(255,215,0,.25)');rg.addColorStop(1,'rgba(255,215,0,0)');g.fillStyle=rg;g.fillRect(bx+90,by-68,65,62);}
  }
  if(lv<=1){g.fillStyle='rgba(160,60,10,.3)';g.fillRect(bx+22,by-51,9,8);g.fillRect(bx+46,by-49,7,6);g.fillRect(bx+66,by-40,6,7);}
  if(lv>=4){
    g.fillStyle='#ddd';g.fillRect(bx+30,by-93,5,11);
    g.fillStyle='#4fc3f7';g.beginPath();g.arc(bx+32,by-93,5,0,Math.PI*2);g.fill();
    g.strokeStyle=C.ac;g.lineWidth=2.5;g.strokeRect(bx+14,by-84,44,32);g.strokeRect(bx+18,by-54,65,29);
  }
}

function pezoa(px,py,lv){
  const sc=['#1565c0','#1565c0','#0d47a1','#1976d2','#1976d2'][lv];
  g.fillStyle=sc;g.fillRect(px-12,py-1,24,21);
  if(lv>=1){g.fillStyle='#4e342e';g.fillRect(px-8,py-1,5,11);g.fillRect(px+3,py-1,5,11);}
  g.fillStyle='#eca97f';g.fillRect(px-5,py-11,10,10);
  g.fillStyle='#eca97f';g.beginPath();g.arc(px,py-23,14,0,Math.PI*2);g.fill();
  g.fillStyle='#5c3d1e';g.beginPath();g.arc(px,py-15,12,.05,Math.PI-.05);g.fill();
  g.fillStyle='#6b4226';g.beginPath();g.arc(px-7,py-19,5,0,Math.PI*2);g.fill();g.beginPath();g.arc(px+7,py-19,5,0,Math.PI*2);g.fill();
  g.fillStyle='#3a2012';g.beginPath();g.ellipse(px-4,py-21,5,3,-.2,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(px+4,py-21,5,3,.2,0,Math.PI*2);g.fill();
  g.fillStyle='white';g.beginPath();g.ellipse(px-5,py-27,3.5,3,0,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(px+5,py-27,3.5,3,0,0,Math.PI*2);g.fill();
  g.fillStyle='#1a0f05';g.beginPath();g.arc(px-5,py-27,2.2,0,Math.PI*2);g.fill();g.beginPath();g.arc(px+5,py-27,2.2,0,Math.PI*2);g.fill();
  g.fillStyle='rgba(255,255,255,.7)';g.beginPath();g.arc(px-4,py-28,1,0,Math.PI*2);g.fill();g.beginPath();g.arc(px+6,py-28,1,0,Math.PI*2);g.fill();
  g.fillStyle='#1e0e00';g.fillRect(px-11,py-34,10,4);g.fillRect(px+1,py-34,10,4);
  g.fillStyle='#3e2714';g.beginPath();g.ellipse(px,py-38,18,4,0,0,Math.PI*2);g.fill();
  g.fillRect(px-11,py-52,22,16);
  g.fillStyle='#e67e00';g.fillRect(px-11,py-38,22,4);
}

function drawObs(o){
  switch(o.n){
    case'hay':
      g.fillStyle='#e8b848';g.fillRect(o.x,o.y,o.w,o.h);
      g.fillStyle='#c89030';g.fillRect(o.x,o.y+o.h*.33,o.w,4);g.fillRect(o.x,o.y+o.h*.66,o.w,4);
      g.fillStyle='#8a6610';g.fillRect(o.x+o.w/3-1,o.y,3,o.h);g.fillRect(o.x+o.w*2/3-1,o.y,3,o.h);
      g.fillStyle='rgba(255,215,70,.35)';g.fillRect(o.x+4,o.y+3,o.w-8,9);
      break;
    case'rock':
      g.fillStyle='#78909c';g.beginPath();g.moveTo(o.x+10,o.y+o.h);g.lineTo(o.x,o.y+o.h*.7);g.lineTo(o.x+6,o.y+o.h*.15);g.lineTo(o.x+20,o.y);g.lineTo(o.x+o.w-5,o.y+o.h*.1);g.lineTo(o.x+o.w,o.y+o.h*.55);g.lineTo(o.x+o.w-7,o.y+o.h);g.closePath();g.fill();
      g.fillStyle='#b0bec5';g.beginPath();g.moveTo(o.x+10,o.y+6);g.lineTo(o.x+26,o.y+3);g.lineTo(o.x+31,o.y+12);g.lineTo(o.x+18,o.y+14);g.closePath();g.fill();
      break;
    case'fence':
      g.fillStyle='#8d6e63';g.fillRect(o.x+3,o.y,o.w-4,o.h);
      g.fillStyle='#a1887f';g.fillRect(o.x-8,o.y+8,o.w+14,5);g.fillRect(o.x-8,o.y+24,o.w+14,5);g.fillRect(o.x-8,o.y+40,o.w+14,5);
      g.fillStyle='#8d6e63';g.beginPath();g.moveTo(o.x+5,o.y-9);g.lineTo(o.x+o.w/2,o.y-16);g.lineTo(o.x+o.w-5,o.y-9);g.lineTo(o.x+o.w-5,o.y);g.lineTo(o.x+5,o.y);g.closePath();g.fill();
      break;
    case'barrel':
      g.fillStyle='#5d4037';g.fillRect(o.x+3,o.y,o.w-6,o.h);
      g.fillStyle='#4e342e';g.beginPath();g.ellipse(o.x+o.w/2,o.y+4,o.w/2-3,5,0,0,Math.PI*2);g.fill();
      g.strokeStyle='#3e2723';g.lineWidth=3.5;
      g.beginPath();g.arc(o.x+o.w/2,o.y+o.h*.32,o.w/2-5,0,Math.PI*2);g.stroke();
      g.beginPath();g.arc(o.x+o.w/2,o.y+o.h*.7,o.w/2-5,0,Math.PI*2);g.stroke();
      g.fillStyle='rgba(255,190,130,.15)';g.fillRect(o.x+6,o.y+8,7,o.h-14);
      break;
  }
}

function drawPc(p){
  const bob=Math.sin(gs.frame*.07+p.bob)*5;
  const px=p.x,py=p.y+bob;
  const rg=g.createRadialGradient(px,py,0,px,py,22);
  rg.addColorStop(0,'rgba(255,195,45,.45)');rg.addColorStop(1,'rgba(255,195,45,0)');
  g.fillStyle=rg;g.fillRect(px-22,py-22,44,44);
  g.save();g.translate(px,py);g.rotate(gs.frame*.035);
  g.fillStyle='#f9a825';g.beginPath();
  const teeth=8;
  for(let i=0;i<teeth;i++){
    const a=i/teeth*Math.PI*2,a2=(i+.5)/teeth*Math.PI*2;
    g.lineTo(Math.cos(a)*13,Math.sin(a)*13);g.lineTo(Math.cos(a)*10,Math.sin(a)*10);
    g.lineTo(Math.cos(a2)*10,Math.sin(a2)*10);g.lineTo(Math.cos(a2)*13,Math.sin(a2)*13);
  }
  g.closePath();g.fill();
  g.fillStyle='#ffd600';g.beginPath();g.arc(0,0,6.5,0,Math.PI*2);g.fill();
  g.fillStyle='#f57f00';g.beginPath();g.arc(0,0,3.5,0,Math.PI*2);g.fill();
  g.restore();
  g.fillStyle='#fff9c4';g.font='6px "Press Start 2P",monospace';g.textAlign='center';
  g.fillText('PIEZA',px,py-17+bob);
}

function drawPars(){
  for(const p of pars){const a=p.life/p.max;g.fillStyle=p.col+a+')';g.beginPath();g.arc(p.x,p.y,p.r*a,0,Math.PI*2);g.fill();}
}

function drawBG(){
  const sky=g.createLinearGradient(0,0,0,GY);
  if(gs.level>=4){sky.addColorStop(0,'#0d3a6e');sky.addColorStop(1,'#1464a0');}
  else{sky.addColorStop(0,'#55a0cc');sky.addColorStop(1,'#bde4f5');}
  g.fillStyle=sky;g.fillRect(0,0,W,GY);
  g.fillStyle='rgba(255,255,255,.82)';
  for(const c of bg.clouds){g.beginPath();g.ellipse(c.x,c.y,c.w/2,16,0,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(c.x-c.w*.26,c.y+6,c.w*.32,11,0,0,Math.PI*2);g.fill();g.beginPath();g.ellipse(c.x+c.w*.26,c.y+6,c.w*.32,11,0,0,Math.PI*2);g.fill();}
  g.fillStyle='#8aaa6a';
  for(const h of bg.hills){g.beginPath();g.moveTo(h.x,GY);g.bezierCurveTo(h.x+h.w*.25,GY-h.h*1.2,h.x+h.w*.75,GY-h.h*1.2,h.x+h.w,GY);g.closePath();g.fill();}
  for(const t of bg.trees){if(t.t===0){g.fillStyle='#4caf50';g.beginPath();g.arc(t.x,GY-7-t.h/2,t.h/2,0,Math.PI*2);g.fill();g.fillStyle='#5d4037';g.fillRect(t.x-2,GY-7,4,8);}else{g.fillStyle='#388e3c';g.beginPath();g.moveTo(t.x,GY-7-t.h);g.lineTo(t.x+t.h*.42,GY-7);g.lineTo(t.x-t.h*.42,GY-7);g.closePath();g.fill();}}
  const gnd=g.createLinearGradient(0,GY,0,H);gnd.addColorStop(0,'#6d4c41');gnd.addColorStop(.12,'#5d4037');gnd.addColorStop(1,'#4e342e');
  g.fillStyle=gnd;g.fillRect(0,GY,W,H-GY);
  g.fillStyle='#56ab2f';g.fillRect(0,GY,W,5);g.fillStyle='#66cc33';g.fillRect(0,GY,W,2);
  for(const d of bg.deco){if(d.x<0||d.x>W)continue;if(d.t===0){g.fillStyle='#795548';g.beginPath();g.ellipse(d.x,GY+4,5,3,0,0,Math.PI*2);g.fill();}else if(d.t===1){g.fillStyle='#4caf50';g.fillRect(d.x-1,GY-8,2,9);g.fillRect(d.x+2,GY-6,2,7);g.fillRect(d.x-3,GY-6,2,7);}}
}

function drawHUD(){
  g.fillStyle='rgba(0,0,0,.5)';g.fillRect(5,5,198,52);
  g.fillStyle='#ffd700';g.font='11px "Press Start 2P",monospace';g.textAlign='left';
  g.fillText('PTOS: '+Math.floor(gs.score),13,24);
  g.fillStyle='#999';g.font='8px "Press Start 2P",monospace';
  g.fillText('MEJOR: '+Math.floor(gs.hi),13,44);
  g.fillStyle='rgba(0,0,0,.5)';g.fillRect(W-215,5,210,52);
  g.fillStyle=gs.level===4?'#ffd700':'#7ec8e3';g.font='8px "Press Start 2P",monospace';g.textAlign='right';
  g.fillText(UPG[gs.level].txt,W-10,22);
  g.fillStyle='#999';g.font='7px "Press Start 2P",monospace';
  g.fillText(gs.level<4?'PIEZAS: '+gs.parts+' / '+UPG[gs.level+1].need:'NIVEL MAXIMO!',W-10,42);
  if(gs.level<4){
    const bw=130,bx2=W-143,by2=49,bh=8;
    g.fillStyle='rgba(255,255,255,.12)';g.fillRect(bx2,by2,bw,bh);
    const prev=UPG[gs.level].need,nxt=UPG[gs.level+1].need;
    const prog=Math.max(0,Math.min(1,(gs.parts-prev)/(nxt-prev)));
    g.fillStyle='#56ab2f';g.fillRect(bx2,by2,bw*prog,bh);
    g.strokeStyle='#666';g.lineWidth=1;g.strokeRect(bx2,by2,bw,bh);
  }
  if(gs.flash>0){
    const a=gs.flash/50;
    g.fillStyle=`rgba(255,200,0,${a*.28})`;g.fillRect(0,0,W,H);
    if(gs.flash>20){
      g.fillStyle=`rgba(255,230,0,${Math.min(a*.9,.9)})`;
      g.font='13px "Press Start 2P",monospace';g.textAlign='center';
      g.fillText('⬆ '+UPG[gs.level].txt,W/2,H/2-8);
      g.fillStyle='rgba(255,255,255,.6)';g.font='8px "Press Start 2P",monospace';
      g.fillText('TRACTOR MEJORADO!',W/2,H/2+12);
    }
    gs.flash--;
  }
}

function drawStart(){
  g.fillStyle='rgba(10,8,5,.62)';g.fillRect(0,0,W,H);
  g.font='19px "Press Start 2P",monospace';g.textAlign='center';
  g.fillStyle='#f39c12';g.fillText('PEZOA',W/2,H/2-48);
  g.fillStyle='#e8d5a3';g.font='9px "Press Start 2P",monospace';g.fillText('El Tractor del Sabor',W/2,H/2-24);
  g.fillStyle='white';g.font='8px "Press Start 2P",monospace';
  if(Math.floor(gs.frame/28)%2===0) g.fillText('ESPACIO / CLICK para empezar',W/2,H/2+16);
  g.fillStyle='#aaa';g.font='6px "Press Start 2P",monospace';
  g.fillText('Junta piezas para modernizar el tractor!',W/2,H/2+40);
}

function drawOver(){
  g.fillStyle='rgba(10,5,5,.7)';g.fillRect(0,0,W,H);
  g.font='18px "Press Start 2P",monospace';g.textAlign='center';
  g.fillStyle='#ff5252';g.fillText('PEZOA CRASHEO!',W/2,H/2-52);
  g.fillStyle='#ffd700';g.font='10px "Press Start 2P",monospace';g.fillText('PUNTAJE: '+Math.floor(gs.score),W/2,H/2-22);
  g.fillStyle='#aaa';g.font='8px "Press Start 2P",monospace';g.fillText('MEJOR: '+Math.floor(gs.hi),W/2,H/2-2);
  g.fillText(UPG[gs.level].txt,W/2,H/2+18);
  if(Math.floor(gs.frame/28)%2===0){g.fillStyle='white';g.font='8px "Press Start 2P",monospace';g.fillText('CLICK / ESPACIO para reiniciar',W/2,H/2+50);}
}

function update(){
  gs.frame++;
  if(!gs.on&&!gs.over) return;
  if(gs.over) return;
  gs.score+=gs.speed*.05;
  if(!pl.gr){pl.vy+=pl.GRAV;pl.y+=pl.vy;if(pl.y>=GY){pl.y=GY;pl.vy=0;pl.gr=true;dust(pl.x+50,GY,4);}}
  pl.wRot+=gs.speed*.058;
  smoke(pl.x+71,pl.y-73);
  const s=gs.speed;
  for(const c of bg.clouds){c.x-=s*.04;if(c.x<-90)c.x=W+90;}
  for(const h of bg.hills){h.x-=s*.09;if(h.x<-h.w)h.x=W+h.w;}
  for(const t of bg.trees){t.x-=s*.28;if(t.x<-35)t.x=W+35;}
  for(const d of bg.deco){d.x-=s;if(d.x<-20)d.x=W+20;}
  oTmr--;if(oTmr<=0){spawnObs();oTmr=Math.floor((55+Math.random()*115)*(3/s)+180/s);}
  pTmr--;if(pTmr<=0){spawnPc();pTmr=Math.floor(320+Math.random()*330);}
  for(const o of obs)o.x-=s;
  for(const p of pcs)p.x-=s;
  while(obs.length&&obs[0].x<-120)obs.shift();
  while(pcs.length&&pcs[0].x<-60)pcs.shift();
  for(const p of pars){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--;}
  pars=pars.filter(p=>p.life>0);
  const px1=pl.x+18,py1=pl.y-pl.H+12,px2=pl.x+pl.W-20,py2=pl.y-4;
  for(const o of obs){
    const m=o.n==='fence'?2:4;
    if(px1<o.x+o.w-m&&px2>o.x+m&&py1<o.y+o.h-3&&py2>o.y+4){endGame();return;}
  }
  for(let i=pcs.length-1;i>=0;i--){
    const p=pcs[i],b=Math.sin(gs.frame*.07+p.bob)*5;
    if(px1<p.x+14&&px2>p.x-14&&py1<p.y+b+14&&py2>p.y+b-14){
      pcs.splice(i,1);gs.parts++;dust(p.x,p.y+b,12,'rgba(255,195,40,');upgrade();
    }
  }
}
function upgrade(){
  for(let i=UPG.length-1;i>0;i--){if(gs.parts>=UPG[i].need&&gs.level<i){gs.level=i;gs.speed=UPG[i].spd;gs.flash=55;dust(pl.x+55,pl.y,18,'rgba(255,200,0,');break;}}
}
function endGame(){gs.over=true;gs.on=false;if(gs.score>gs.hi)gs.hi=gs.score;dust(pl.x+55,pl.y,25);}
function restart(){pl.y=GY;pl.vy=0;pl.gr=true;pl.wRot=0;obs=[];pcs=[];pars=[];oTmr=85;pTmr=400;Object.assign(gs,{on:true,over:false,score:0,speed:3,parts:0,level:0,flash:0,frame:0});}

function loop(){
  g.clearRect(0,0,W,H);
  drawBG();
  update();
  for(const o of obs)drawObs(o);
  for(const p of pcs)drawPc(p);
  drawPars();
  const shY=gs.level===0&&gs.on&&!gs.over?Math.sin(gs.frame*.85)*1.8:0;
  if(!gs.over||Math.floor(gs.frame/9)%2===0){
    tractor(pl.x,pl.y,gs.level,pl.wRot,shY);
    pezoa(pl.x+36,pl.y-83+shY,gs.level);
  }
  drawHUD();
  if(!gs.on&&!gs.over)drawStart();
  if(gs.over)drawOver();
  requestAnimationFrame(loop);
}
loop();
</script>
